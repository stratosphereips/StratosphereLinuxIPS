<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slips Graph Structure Viewer</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="app-header">
          <div>
            <h1>Graph Structure</h1>
            <p id="graph-root">Loading graph output...</p>
          </div>
        </header>

        <section class="panel">
          <label for="graph-select">Window</label>
          <select id="graph-select"></select>
          <label for="view-select" class="secondary-label">View</label>
          <select id="view-select">
            <option value="smart">Smart overview</option>
            <option value="overview">Overview</option>
            <option value="entity">Entity overview</option>
            <option value="raw">Raw graph</option>
          </select>
          <div id="graph-notice" class="notice hidden"></div>
          <div id="graph-stats" class="stats-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Controls</div>
          <div class="button-grid">
            <button id="layout-button" type="button">Relayout</button>
            <button id="show-all-button" type="button">Show all</button>
            <button id="focus-button" type="button">Focus node</button>
            <button id="toggle-connections-button" type="button">Toggle links</button>
            <button id="expand-button" type="button">Expand one hop</button>
            <button id="hide-leaves-button" type="button">Hide leaves</button>
          </div>
          <input id="search-input" type="search" placeholder="Find node, feature, or edge">
          <div class="layout-controls">
            <div class="range-row">
              <label for="edge-length-slider">Link length</label>
              <output id="edge-length-value" for="edge-length-slider">150 px</output>
              <input id="edge-length-slider" type="range" min="20" max="1000" step="10" value="150">
            </div>
            <div class="range-row">
              <label for="node-repulsion-slider">Repulsion</label>
              <output id="node-repulsion-value" for="node-repulsion-slider">18000</output>
              <input id="node-repulsion-slider" type="range" min="1000" max="300000" step="1000" value="18000">
            </div>
            <div class="range-row">
              <label for="node-gap-slider">Node gap</label>
              <output id="node-gap-value" for="node-gap-slider">30</output>
              <input id="node-gap-slider" type="range" min="0" max="240" step="2" value="30">
            </div>
            <div class="range-row">
              <label for="gravity-slider">Gravity</label>
              <output id="gravity-value" for="gravity-slider">0.08</output>
              <input id="gravity-slider" type="range" min="0" max="2" step="0.01" value="0.08">
            </div>
            <div class="range-row">
              <label for="spacing-slider">Component spacing</label>
              <output id="spacing-value" for="spacing-slider">130 px</output>
              <input id="spacing-slider" type="range" min="0" max="1000" step="10" value="130">
            </div>
            <div class="range-row">
              <label for="iterations-slider">Iterations</label>
              <output id="iterations-value" for="iterations-slider">1200</output>
              <input id="iterations-slider" type="range" min="100" max="8000" step="100" value="1200">
            </div>
            <div class="range-row">
              <label for="label-size-slider">Label size</label>
              <output id="label-size-value" for="label-size-slider">10 px</output>
              <input id="label-size-slider" type="range" min="6" max="28" step="1" value="10">
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">Node Types</div>
          <div id="node-type-filters" class="chip-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Edge Types</div>
          <div id="edge-type-filters" class="chip-list"></div>
        </section>

        <section class="panel scroll-panel">
          <div class="panel-title">Transitions</div>
          <div id="transition-list" class="transition-list"></div>
        </section>
      </aside>

      <main class="workspace">
        <div id="graph"></div>
        <div id="tooltip" class="tooltip hidden"></div>
      </main>

      <aside class="details">
        <section class="panel detail-panel">
          <div class="panel-title">Selection</div>
          <div id="selection-details" class="details-content">
            Hover or click a node, edge, or transition.
          </div>
        </section>

        <section class="panel doc-panel">
          <div class="panel-title">Documentation</div>
          <div id="documentation"></div>
        </section>
      </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/cytoscape/dist/cytoscape.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
